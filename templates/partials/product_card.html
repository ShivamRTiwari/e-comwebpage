<article class="product-card">
  <a href="{{ url_for('product_detail', product_id=product.id) }}" class="product-image-link">
    <img src="{{ product.image_url }}" alt="{{ product.name }}" loading="lazy">
  </a>
  <div class="product-card-body">
    <span class="product-category">{{ product.category }}</span>
    <h3><a href="{{ url_for('product_detail', product_id=product.id) }}">{{ product.name }}</a></h3>
    <p class="product-price">${{ "%.2f"|format(product.price) }}</p>
    <form action="{{ url_for('cart_add', product_id=product.id) }}" method="post" class="inline-form">
      <input type="hidden" name="quantity" value="1">
      <button type="submit" class="btn btn-primary btn-sm btn-block">Add to Cart</button>
    </form>
  </div>
</article>
